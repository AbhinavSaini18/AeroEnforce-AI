services:
  db:
    image: postgis/postgis:16-3.4
    container_name: aeroenforce_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  db_viewer:
    image: adminer:latest
    container_name: aeroenforce_viewer
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data: